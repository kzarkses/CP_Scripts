<?xml version="1.0" encoding="UTF-8"?>
<!--
  CP_Inspector toolbar icon — 30x90 (3 vertical states for REAPER).
  Concept: a magnifier glass over 3 stacked content lines.
  Top    = normal   (outlined glass + thin lines)
  Middle = hover    (thicker outline)
  Bottom = active   (filled handle, solid lens ring)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="30" height="90" viewBox="0 0 30 90">
  <!-- ============== STATE: NORMAL (y offset 0) ============== -->
  <g transform="translate(0,0)">
    <!-- content lines (the data being inspected) -->
    <g stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.1" stroke-linecap="round">
      <line x1="5"  y1="9"  x2="22" y2="9"/>
      <line x1="5"  y1="15" x2="20" y2="15"/>
      <line x1="5"  y1="21" x2="17" y2="21"/>
    </g>
    <!-- magnifier (offset bottom-right, slightly outside the lines) -->
    <g stroke="#ffffff" stroke-width="1.4" fill="none" stroke-linecap="round">
      <circle cx="19" cy="18" r="5.5"/>
      <line x1="23" y1="22" x2="27" y2="26"/>
    </g>
  </g>

  <!-- ============== STATE: HOVER (y offset 30) ============== -->
  <g transform="translate(0,30)">
    <g stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.3" stroke-linecap="round">
      <line x1="5"  y1="9"  x2="22" y2="9"/>
      <line x1="5"  y1="15" x2="20" y2="15"/>
      <line x1="5"  y1="21" x2="17" y2="21"/>
    </g>
    <g stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round">
      <circle cx="19" cy="18" r="5.5"/>
      <line x1="23" y1="22" x2="27" y2="26"/>
    </g>
  </g>

  <!-- ============== STATE: ACTIVE (y offset 60) ============== -->
  <g transform="translate(0,60)">
    <g stroke="#ffffff" stroke-opacity="0.85" stroke-width="1.4" stroke-linecap="round">
      <line x1="5"  y1="9"  x2="22" y2="9"/>
      <line x1="5"  y1="15" x2="20" y2="15"/>
      <line x1="5"  y1="21" x2="17" y2="21"/>
    </g>
    <!-- filled lens ring (donut) + solid handle -->
    <g fill="#ffffff" stroke="none">
      <path d="M19,12.5 a5.5,5.5 0 1,0 0,11 a5.5,5.5 0 1,0 0,-11 z
               M19,15 a3,3 0 1,1 0,6 a3,3 0 1,1 0,-6 z" fill-rule="evenodd"/>
      <rect x="22.6" y="21.6" width="5.2" height="2" rx="1"
            transform="rotate(45 22.6 21.6)"/>
    </g>
  </g>
</svg>
